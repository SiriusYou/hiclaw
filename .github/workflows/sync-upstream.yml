name: Sync Upstream

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC (01:00 PDT / 16:00 CST)
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/alibaba/hiclaw.git

      - name: Fetch upstream and origin
        run: |
          git fetch upstream --tags
          git fetch origin --prune --tags

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count origin/main..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" = "0" ]; then
            echo "Origin is up to date with upstream. Nothing to do."
          else
            echo "Origin is $BEHIND commits behind upstream."
          fi

      - name: Tag SHA conflict precheck
        if: steps.check.outputs.behind != '0'
        run: |
          UPSTREAM_TAGS=$(git ls-remote --tags --refs upstream)
          ORIGIN_TAGS=$(git ls-remote --tags --refs origin)
          CONFLICTS=$(comm -12 \
            <(echo "$UPSTREAM_TAGS" | awk '{print $2}' | sort) \
            <(echo "$ORIGIN_TAGS" | awk '{print $2}' | sort) \
            | while read ref; do
                U=$(echo "$UPSTREAM_TAGS" | awk -v ref="$ref" '$2==ref {print $1}')
                O=$(echo "$ORIGIN_TAGS" | awk -v ref="$ref" '$2==ref {print $1}')
                [ "$U" != "$O" ] && echo "$ref U=$U O=$O"
              done || true)
          if [ -n "$CONFLICTS" ]; then
            echo "::error::Tag SHA mismatch detected"
            echo "$CONFLICTS"
            exit 1
          fi

      - name: Rebase onto upstream
        id: rebase
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout main
          if git rebase upstream/main; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased main
        if: steps.rebase.outputs.result == 'success'
        run: |
          git push origin main --force-with-lease

      - name: Sync missing upstream tags
        if: steps.rebase.outputs.result == 'success'
        run: |
          MISSING=$(comm -23 \
            <(git ls-remote --tags --refs upstream | awk '{print $2}' | sort) \
            <(git ls-remote --tags --refs origin | awk '{print $2}' | sort))
          if [ -n "$MISSING" ]; then
            echo "Pushing missing tags:"
            echo "$MISSING"
            echo "$MISSING" | xargs git push origin
          else
            echo "All upstream tags already in origin."
          fi

      - name: Fail on rebase conflict
        if: steps.rebase.outputs.result == 'conflict'
        run: |
          echo "::error::Rebase failed due to merge conflicts."
          exit 1

      - name: Report failure summary
        if: failure()
        env:
          COMMITS_BEHIND: ${{ steps.check.outputs.behind }}
        run: |
          echo "::error::Upstream sync failed. Origin is ${COMMITS_BEHIND:-unknown} commits behind upstream."
          echo "### Sync Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Upstream:** \`alibaba/hiclaw\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commits behind:** ${COMMITS_BEHIND:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Possible causes: rebase conflict, tag SHA mismatch, push rejection." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "git remote add upstream https://github.com/alibaba/hiclaw.git" >> "$GITHUB_STEP_SUMMARY"
          echo "git fetch upstream --tags" >> "$GITHUB_STEP_SUMMARY"
          echo "git rebase upstream/main" >> "$GITHUB_STEP_SUMMARY"
          echo "# resolve conflicts if any" >> "$GITHUB_STEP_SUMMARY"
          echo "git rebase --continue" >> "$GITHUB_STEP_SUMMARY"
          echo "git push origin main --force-with-lease" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
